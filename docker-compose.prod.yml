name: stk-aktiv

# Production-стек для VPS. Публичный трафик принимает Nginx на ХОСТЕ
# (см. deploy/nginx/stk-aktiv.conf) и проксирует на 127.0.0.1:3000 —
# порт приложения намеренно НЕ публикуется на 0.0.0.0, наружу торчат
# только 80/443 через системный Nginx. Mongo вообще не публикует порт
# на хост и доступен только из внутренней docker-сети.
#
# Запуск:      docker compose --env-file .env.production -f docker-compose.prod.yml up -d mongo app
# Индексы БД:  docker compose --env-file .env.production -f docker-compose.prod.yml --profile tools run --rm indexer
# (полностью повторяет deploy.sh, здесь — для ручного/аварийного использования)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  app:
    build:
      context: .
      dockerfile: Dockerfile.yml
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
        NEXT_PUBLIC_YANDEX_VERIFICATION: ${NEXT_PUBLIC_YANDEX_VERIFICATION:-}
    restart: unless-stopped
    logging: *default-logging
    env_file: .env.production
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      # Только loopback — единственный публичный вход это хостовый Nginx.
      - "127.0.0.1:3000:3000"
    volumes:
      - media-uploads:/app/media
    networks: [internal]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Идемпотентное создание индексов MongoDB (scripts/create-search-indexes.ts).
  # Не является постоянным сервисом: запускается по требованию через
  # `--profile tools run --rm indexer` (см. deploy.sh). В проекте нет
  # SQL-подобных миграций — Mongoose-схема ничего не версионирует,
  # поэтому единственный необходимый предварительный шаг — индексы.
  indexer:
    build:
      context: .
      dockerfile: Dockerfile.yml
      target: tools
    logging: *default-logging
    env_file: .env.production
    depends_on:
      mongo:
        condition: service_healthy
    networks: [internal]
    profiles: ["tools"]

networks:
  internal:

volumes:
  mongo-data:
  media-uploads:
