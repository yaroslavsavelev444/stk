# deploy/nginx/sites-available/stkaktiv.ru.conf
#
# Публичный сайт: stkaktiv.ru (канонический домен) + www.stkaktiv.ru (301 на apex).
#
# Установка на сервере:
#   sudo cp deploy/nginx/sites-available/stkaktiv.ru.conf /etc/nginx/sites-available/
#   sudo cp deploy/nginx/sites-available/admin.stkaktiv.ru.conf /etc/nginx/sites-available/
#   sudo cp -r deploy/nginx/snippets /etc/nginx/
#   sudo ln -s /etc/nginx/sites-available/stkaktiv.ru.conf /etc/nginx/sites-enabled/
#   sudo ln -s /etc/nginx/sites-available/admin.stkaktiv.ru.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ВАЖНО: до выпуска сертификатов certbot'ом (см. README) секции
# `listen 443 ssl` не заработают — на первом проходе нужно временно
# закомментировать HTTPS-блоки или использовать `certbot --nginx`,
# который сам допишет строки ssl_certificate после успешной валидации.
# Ниже конфиг уже в "финальном" виде (как будет выглядеть после certbot).
#
# upstream `nextapp` и map `$connection_upgrade` объявлены один раз в
# /etc/nginx/conf.d/upstream.conf (см. deploy/nginx/conf.d/upstream.conf) —
# этот файл и admin.stkaktiv.ru.conf оба на него ссылаются, поэтому вынесено
# отдельно, а не задублировано/не спрятано в одном из site-файлов.

# ---------- HTTP: ACME challenge + редирект на HTTPS ----------
server {
  listen 80;
  listen [::]:80;
  server_name stkaktiv.ru www.stkaktiv.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://stkaktiv.ru$request_uri;
  }
}

# ---------- www -> apex (301, до проверки TLS) ----------
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.stkaktiv.ru;

  ssl_certificate     /etc/letsencrypt/live/stkaktiv.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stkaktiv.ru/privkey.pem;

  return 301 https://stkaktiv.ru$request_uri;
}

# ---------- Основной сайт ----------
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name stkaktiv.ru;

  ssl_certificate     /etc/letsencrypt/live/stkaktiv.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/stkaktiv.ru/privkey.pem;

  client_max_body_size 25m;

  include snippets/security-headers.conf;

  # Иммутабельные статические ассеты Next и медиа Payload — длинный кэш.
  location /_next/static/ {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /media/ {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
  }
}
