# deploy/nginx/sites-available/admin.stkaktiv.ru.conf
#
# admin.stkaktiv.ru — Payload Admin UI.
#
# Важная деталь архитектуры: Payload Admin в этом проекте не отдельное
# приложение, а роут `/admin` внутри того же Next.js процесса
# (app/(payload)/admin/[[...segments]]/page.tsx, serverURL = NEXT_PUBLIC_SERVER_URL).
# Поэтому admin.stkaktiv.ru не проксируется "как есть" — первый заход на
# `/` должен превращаться в `/admin`, а вот всё, что уже приходит с
# префиксом /admin (клиентская навигация после первой загрузки), статика
# (/_next/*), API Payload (/api/*), медиа (/media/*) и общий для всего
# приложения /manifest.webmanifest — идут БЕЗ дополнительного rewrite,
# иначе получается двойной префикс /admin/admin/... (см. комментарии
# внутри location-блоков ниже — это реальный баг, который здесь был).
#
# Сессия аутентификации общая между stkaktiv.ru и admin.stkaktiv.ru за счёт
# COOKIE_DOMAIN=".stkaktiv.ru" в .env.production (см. payload.config.ts /
# src/payload/collections/Users.ts) и CORS/CSRF, разрешающих оба origin'а
# (см. src/payload/config/allowedOrigins.ts).

server {
  listen 80;
  listen [::]:80;
  server_name admin.stkaktiv.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://admin.stkaktiv.ru$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin.stkaktiv.ru;

  # Отдельный сертификат для admin-поддомена (см. README — certbot запускается
  # для admin.stkaktiv.ru отдельно от stkaktiv.ru/www.stkaktiv.ru).
  ssl_certificate     /etc/letsencrypt/live/admin.stkaktiv.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.stkaktiv.ru/privkey.pem;

  client_max_body_size 25m;

  include snippets/security-headers.conf;

  # КРИТИЧНО: запросы, которые клиент уже шлёт с префиксом /admin —
  # это ВСЯ клиентская навигация и RSC-фетчи после самой первой загрузки
  # страницы (реальный роут в приложении и есть /admin/..., хэшированный
  # HTML уже это знает и генерирует ссылки/фетчи соответственно) — должны
  # проходить БЕЗ повторного rewrite. Без этого блока каждый следующий
  # запрос ловил бы ВТОРОЙ проход через `location /` ниже и превращался
  # в /admin/admin/..., которого не существует — именно это вызывало
  # постоянные перезагрузки/мигание и "This page couldn't load": первая
  # загрузка (/  -> /admin/) проходила, а любое дальнейшее действие в
  # админке (переход между разделами, фетч данных) — нет.
  location ^~ /admin {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
  }

  # Роуты, общие для всего приложения — проксируем БЕЗ префикса /admin.
  location /_next/ {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
  }

  location /api/ {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
  }

  location /media/ {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /favicon.ico {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
  }

  # app/manifest.ts — общий для всего приложения роут (не под /admin),
  # ссылку на него Next.js сам добавляет в <head> каждой страницы, в т.ч.
  # админки. Без этой строки запрос улетал в rewrite ниже, отдавался HTML
  # вместо JSON, и браузер ругался "Manifest: Line: 1, column: 1, Syntax
  # error" — это то, что было в консоли.
  location = /manifest.webmanifest {
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
  }

  # Всё остальное (в первую очередь — сам первый заход на "/") — сама
  # админка. Переписываем путь на /admin/<остальное> и передаём
  # upstream'у уже переписанный URI (proxy_pass без указания своего
  # URI-компонента => Nginx шлёт то, что получилось после rewrite).
  location / {
    rewrite ^/(.*)$ /admin/$1 break;
    include snippets/proxy-common.conf;
    proxy_pass http://nextapp;
  }
}
