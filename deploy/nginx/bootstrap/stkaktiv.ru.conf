# deploy/nginx/bootstrap/stkaktiv.ru.conf
#
# ВРЕМЕННЫЙ конфиг для самого первого запуска — ДО того как выпущены
# сертификаты Let's Encrypt. Содержит только порт 80 (ACME challenge +
# редирект), без ssl-блоков, поэтому `nginx -t` проходит даже когда
# /etc/letsencrypt ещё пуст. После получения сертификатов (см.
# deploy/README.md, шаг 4) этот файл заменяется на
# deploy/nginx/sites-available/stkaktiv.ru.conf.

server {
  listen 80;
  listen [::]:80;
  server_name stkaktiv.ru www.stkaktiv.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://stkaktiv.ru$request_uri;
  }
}
