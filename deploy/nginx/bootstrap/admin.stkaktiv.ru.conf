# deploy/nginx/bootstrap/admin.stkaktiv.ru.conf
# См. deploy/nginx/bootstrap/stkaktiv.ru.conf — тот же принцип для admin-поддомена.

server {
  listen 80;
  listen [::]:80;
  server_name admin.stkaktiv.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://admin.stkaktiv.ru$request_uri;
  }
}
