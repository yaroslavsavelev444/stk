# deploy/nginx/conf.d/hardening.conf
#
# Небольшие глобальные правки без переписывания всего /etc/nginx/nginx.conf
# целиком (VPS может обслуживать что-то ещё, поэтому конфиг только
# добавляет, ничего не удаляет из системного nginx.conf).
#
# Установка: sudo cp deploy/nginx/conf.d/hardening.conf /etc/nginx/conf.d/

# Не светим версию Nginx в заголовке Server и на дефолтных страницах ошибок.
server_tokens off;
