# deploy/nginx/conf.d/upstream.conf
#
# Общие для всех site-конфигов объявления. Стандартный nginx.conf (пакет
# nginx на Debian/Ubuntu) подключает /etc/nginx/conf.d/*.conf раньше
# /etc/nginx/sites-enabled/*, поэтому upstream и map доступны обоим
# server-блокам (stkaktiv.ru.conf и admin.stkaktiv.ru.conf) без дублирования.
#
# Установка: sudo cp deploy/nginx/conf.d/upstream.conf /etc/nginx/conf.d/

upstream nextapp {
  server 127.0.0.1:3000;
  keepalive 32;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}
