# deploy/nginx/snippets/proxy-common.conf
#
# Общие настройки проксирования на upstream `nextapp` (127.0.0.1:3000).
# Подключается через `include` во всех server-блоках, которые проксируют
# запросы на приложение — чтобы не дублировать одни и те же директивы.

proxy_http_version 1.1;

# Поддержка WebSocket на случай будущих live-preview/collab-фич Payload
# или HMR-подобных соединений. Ничего не ломает для обычных HTTP-запросов.
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Next.js standalone-сервер уже сам зовёт gzip (compress: true в next.config.mjs),
# поэтому не пережимаем на уровне Nginx — только пропускаем Accept-Encoding.
proxy_set_header Accept-Encoding $http_accept_encoding;

# Разумные таймауты: Payload admin operations (bulk-действия, генерация
# отчётов, загрузка крупных файлов) могут выполняться дольше стандартных 60с.
proxy_connect_timeout 10s;
proxy_send_timeout 90s;
proxy_read_timeout 90s;

proxy_buffering on;
proxy_buffer_size 8k;
proxy_buffers 8 8k;

# Не даём Nginx самому обрабатывать редиректы от Next (доверяем Location as-is).
proxy_redirect off;
