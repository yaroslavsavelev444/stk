# deploy/nginx/snippets/security-headers.conf
#
# Next.js (next.config.mjs) уже выставляет Permissions-Policy на все роуты —
# намеренно НЕ дублируем этот заголовок здесь (Nginx `add_header` не
# заменяет заголовок от upstream, а добавляет второй — браузер получит
# два значения Permissions-Policy, что как минимум мусор, а по факту может
# трактоваться непредсказуемо). Everything else, чего у Next нет — HSTS,
# X-Content-Type-Options, X-Frame-Options, Referrer-Policy — выставляем тут.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Next.js уже отключает X-Powered-By (poweredByHeader: false) и Nginx
# скрывает свою версию через server_tokens off (см. nginx.conf).
