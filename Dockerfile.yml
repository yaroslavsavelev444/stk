# Dockerfile
# syntax=docker/dockerfile:1.7

# Node 20 не подходит по двум причинам: (1) pnpm 11.x (см. "packageManager"
# в package.json) требует Node >= 22.13 — использует нативный node:sqlite,
# которого в Node 20 просто нет (ERR_UNKNOWN_BUILTIN_MODULE); (2) Node 20
# вышел из LTS 30 апреля 2026. Node 24 — текущая Active LTS (до апреля 2028).
FROM node:24-slim AS base
RUN corepack enable && corepack prepare pnpm@11.9.0 --activate
WORKDIR /app

# ---------- deps ----------
FROM base AS deps
COPY package.json pnpm-lock.yaml pnpm-workspace.yaml ./
RUN pnpm install --frozen-lockfile

# ---------- tools ----------
# Лёгкий стейдж для одноразовых операционных задач, которые не должны жить
# в runtime-образе (там нет node_modules/scripts — standalone-выхлоп Next).
# Используется в проде только для идемпотентного создания индексов MongoDB
# (pnpm db:index) через docker-compose profile "tools", ДО пересборки/
# рестарта приложения. Полноценных Payload-миграций в проекте нет — БД
# документная (Mongoose), схема не версионируется миграциями.
FROM deps AS tools
COPY . .
CMD ["pnpm", "db:index"]

# ---------- build ----------
FROM base AS builder
COPY --from=deps /app/node_modules ./node_modules
COPY . .

ARG NEXT_PUBLIC_SITE_URL
ARG NEXT_PUBLIC_SERVER_URL
ARG NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION
ARG NEXT_PUBLIC_YANDEX_VERIFICATION
ENV NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL \
    NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL \
    NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=$NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION \
    NEXT_PUBLIC_YANDEX_VERIFICATION=$NEXT_PUBLIC_YANDEX_VERIFICATION \
    NEXT_TELEMETRY_DISABLED=1

# app/(frontend)/layout.tsx has `export const dynamic = "force-dynamic"`,
# so build never touches Mongo — these only need to exist as strings.
ENV MONGODB_URI="mongodb://build-time-placeholder/build" \
    PAYLOAD_SECRET="build-time-placeholder"

# Turbopack написан на Rust и использует Rayon для параллельного разбора/
# сборки модулей — по умолчанию задействует все обнаруженные ядра
# одновременно (осознанный компромисс скорости в обмен на CPU). На
# небольшом VPS это на время сборки забирает 100% CPU у Nginx/SSH/Mongo.
# RAYON_NUM_THREADS ограничивает параллелизм именно этого внутреннего
# пула потоков — меньше значение -> сборка идёт более последовательно
# ("этапами"), но дольше по времени. Переопределяется через
# --build-arg BUILD_CPU_LIMIT=N (0 = без ограничения, авто по числу ядер).
ARG BUILD_CPU_LIMIT=1
ENV RAYON_NUM_THREADS=${BUILD_CPU_LIMIT}

# --mount=type=cache сохраняет кеш Turbopack (см. next.config.mjs,
# turbopackFileSystemCacheForBuild) МЕЖДУ отдельными запусками `docker
# build`, даже когда сам образ пересобирается с нуля — BuildKit хранит
# этот кеш отдельно от слоёв образа. Первый прогон после появления этой
# строки кеш ещё не имеет и займёт столько же времени, что и раньше;
# начиная со второго пересобираются только изменившиеся модули.
RUN --mount=type=cache,target=/app/.next/cache,sharing=locked \
    pnpm build

# ---------- runtime ----------
FROM node:24-slim AS runner
WORKDIR /app
ENV NODE_ENV=production \
    NEXT_TELEMETRY_DISABLED=1 \
    PORT=3000 \
    HOSTNAME=0.0.0.0

RUN groupadd --system --gid 1001 nodejs \
  && useradd --system --uid 1001 --gid nodejs nextjs \
  && mkdir -p /app/media \
  && chown nextjs:nodejs /app/media

COPY --from=builder /app/public ./public
COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static

USER nextjs
EXPOSE 3000
HEALTHCHECK --interval=15s --timeout=5s --retries=5 \
  CMD node -e "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
CMD ["node", "server.js"]