name: stk-aktiv

# Локальный/дев-стек: Mongo + приложение, без реверс-прокси и TLS.
# Для production используется отдельный docker-compose.prod.yml
# (см. deploy/README.md) вместе с Nginx и Certbot на хосте VPS.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  app:
    build:
      context: .
      dockerfile: Dockerfile.yml
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    restart: unless-stopped
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - media-uploads:/app/media
    networks: [internal]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Одноразовый запуск: docker compose --profile tools run --rm indexer
  indexer:
    build:
      context: .
      dockerfile: Dockerfile.yml
      target: tools
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    networks: [internal]
    profiles: ["tools"]

networks:
  internal:

volumes:
  mongo-data:
  media-uploads:
